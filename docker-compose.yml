services:
  monochrome-streamer:
    build: .
    image: monochrome-streamer:latest
    container_name: Monochrome-Streamer
    restart: unless-stopped
    ports:
      - "8888:8888"
    environment:
      APP_TITLE: ${APP_TITLE:-Monochrome-Streamer}
      DATA_DIR: /data
    volumes:
      - type: bind
        source: ${MUSIC_DIR:-./sample-library}
        target: /music
        read_only: true
      - type: bind
        source: ${APP_DATA_DIR:-./data}
        target: /data
