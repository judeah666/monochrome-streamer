services:
  monochrome-streamer:
    build: .
    image: judeah666/monochrome-streamer:${IMAGE_TAG:-0.1.0}
    container_name: monochrome-streamer
    restart: unless-stopped
    ports:
      - "8888:8888"
    environment:
      APP_TITLE: ${APP_TITLE:-Monochrome-Streamer}
      DATA_DIR: /data
      LIBRARY_DATABASE_PATH: /data/library.sqlite
      COVER_CACHE_PATH: /data/covers
    volumes:
      - ${MUSIC_DIR:-./sample-library}:/music:ro
      - ${APP_DATA_DIR:-./data}:/data
