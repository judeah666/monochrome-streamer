services:
  monochrome-streamer:
    image: judeah666/monochrome-streamer:latest
    container_name: monochrome-streamer
    restart: unless-stopped
    ports:
      - "8888:8888"
    env_file:
      - .env
    environment:
      NOAUTH: ${NOAUTH:-false}
      DOWNLOADS: ${DOWNLOADS:-true}
    volumes:
      - ${MUSIC_DIR:-./sample-library}:/music
      - ${APP_DATA_DIR:-./data}:/data
