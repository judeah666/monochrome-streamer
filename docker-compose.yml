services:
  monochrome-streamer:
    image: judeah666/monochrome-streamer:${IMAGE_TAG:-0.2.1}
    container_name: monochrome-streamer
    restart: unless-stopped
    ports:
      - "8888:8888"
    env_file:
      - .env
    volumes:
      - ${MUSIC_DIR:-./sample-library}:/music
      - ${APP_DATA_DIR:-./data}:/data
